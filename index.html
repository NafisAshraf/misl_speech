<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHyTfAAsrekwKmP1"
      crossorigin="anonymous"
    />
    <title>Speech To Text</title>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-dark">
      <div class="container-fluid">
        <h1 class="navbar-brand text-white">Speech to text</h1>
        <div class="d-flex" role="search">
          <select class="form-select" id="lang-select">
            <option value="bn-BD">Bangla</option>
            <option value="en-US">English US</option>
            <option value="fr-FR">French</option>
            <option value="de-DE">German</option>
            <option value="es-ES">Spanish</option>
            <option value="it-IT">Italian</option>
          </select>
        </div>
      </div>
    </nav>
    <div class="container my-4">
      <div class="form-floating form-control" style="min-height: 300px">
        <span id="final"></span>
        <span id="interim"></span>
      </div>
      <div class="btn-group mt-4" role="group" aria-label="Basic example">
        <button type="button" class="btn btn-success" id="start">Start</button>
        <button type="button" class="btn btn-danger" id="stop">Stop</button>
      </div>
      <div class="mt-4">
        <p id="status" class="lead mt-3" style="display: none">Listening...</p>
      </div>
    </div>

    <script src="./main.js"></script>
  </body>
</html>
