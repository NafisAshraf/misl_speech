<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- <link rel="icon" type="image/svg+xml" href="/vite.svg" /> -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MIR STT</title>
  </head>
  <body class="bg-dark">
    <div id="app">
      <nav class="navbar navbar-expand-lg bg-dark">
        <div class="container-fluid">
          <h1 class="navbar-brand text-white fs-3">
            <img src="/mir.png" alt="mir logo" style="height: 40px" /> Speech to
            text
          </h1>
          <div class="d-flex" role="search">
            <select class="form-select" id="lang-select">
              <option value="bn-BD">Bangla</option>
              <option value="en-US">English US</option>
              <option value="fr-FR">French</option>
              <option value="de-DE">German</option>
              <option value="es-ES">Spanish</option>
            </select>
          </div>
        </div>
      </nav>
      <div class="container my-4">
        <div
          class="form-floating form-control shadow"
          style="min-height: 300px; position: relative;"
        >
          <span id="final" contenteditable="false"></span>
          <span id="interim"></span>
        </div>
        <div class="mt-4">
          <p class="text-white">
            Press Start and enable mic (if requested) to start transcribing
          </p>
        </div>
        <div class="btn-group" role="group" aria-label="Basic example">
          <button type="button" class="btn btn-success" id="start">
            Start
          </button>
          <button type="button" class="btn btn-danger" id="stop" disabled>
            Stop
          </button>
          <button disabled id="edit" style="margin-left: 7px; border-top-left-radius: 5px; border-bottom-left-radius: 5px;" type="button" class="btn btn-warning">edit</button>
        </div>
        <button type="button" class="btn btn-primary mx-2" id="transcribe">
          Summarize
        </button>
        <button type="button" class="btn btn-warning" id="clear">Clear</button>
        <div class="btn-group mx-2" role="group" aria-label="Basic example">
          <a
            tabindex="-1"
            role="button"
            style="display: none"
            class="btn btn-secondary"
            id="downloadbutton"
          >
            Download Recording
          </a>
          <button
            type="button"
            style="display: none"
            class="btn btn-danger"
            id="deleteaudio"
          >
            Delete audio
          </button>
        </div>

        <div class="mt-4 form-floating form-control shadow" id="transcribed">
          Press summarize after stopping if you want a summary. Please wait for
          summary, this may take a few minutes.
        </div>
      </div>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
